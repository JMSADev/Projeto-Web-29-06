<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto WEB - html/css</title>
    <link rel="stylesheet" href="../css/styles_formulario.css">
</head>
<body>
    <div id="links">
        <a href="../index.html">Pagina inicial</a> | <a href="texto.html">Texto</a> | <a href="/outras_paginas/outro.html">Outro Texto</a> | <a href="cadastro.html">Cadastro</a> | 
        <a href="listas.html">Lista</a> | <a href="tabela.html">Tabela</a> | <a href="imagens.html">imagens</a>    
    </div>

    <div id="div-form">
        <h3>Formulário HTML</h3>

        <form name="form-pessoa" id="form-pessoa" method="post">
            
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input-txt01" maxlength="5" required
            placeholder="Informe seu nome">


            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-txt01" maxlength="14" required
            placeholder="Informe seu CPF">


            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-txt01" maxlength="14" required
            pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000"> 


            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sxF" class="input-radio" value="F" required value="F"> Feminino
            <input type="radio" name="sexo" id="sxM" class="input-radio" value="M" required value="M"> Masculino
            <input type="radio" name="sexo" id="sxO" class="input-radio" value="O" required value="O" checked> Outro

            <label for="estado">Estado</label>
            <select name="estado" id="estado" class="input-txt02" required>
                <option>Selecione o Estado</option>
                <option value="AL">Alagoas</option>
                <option value="BA">Bahia</option>
                <option value="PE">Pernambuco</option>
                <option value="PB">Paraiba</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="CE">Ceará</option>
                <option value="PI">Piaui</option>
                <option value="MA">Maranhão</option>
                <option value="SE" selected>Sergipe</option>
            </select>


            <label for="preferencias">Preferências</label>
            <input type="checkbox" name="estudo" class="input= check" id="estudo" value="estudo">Estudo
            <input type="checkbox" name="viagem" class="input= check" id="viagem" value="viagem" checked>Viagem
            <input type="checkbox" name="trabalho" class="input= check" id="trabalho" value="trabalho">Trabalho
            <input type="checkbox" name="compras" class="input= check" id="compras" value="compras">Compras


            <label for="comentario">Comentário</label>
            <textarea name="comentario" id="comentario"></textarea>


            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" class="input-txt02" required placeholder="Informe uma senha" maxlength="6">
            

            <label for="datanascimento">Data de Nascimento</label>
            <input type="date" name="datanascimento" id="datanascimento" class="input-txt02" required>


            <label for="quantidade">Quantidade</label>
            <input type="range" name="quantidade" id="quantidade" class="input-txt02" min="0" max="10" step="2">

            <br><br>


            
            <button type="submit" id="btn-enviar" class="btn">Enviar</button>
            <button type="reset" id="btn-limpar" class="btn">Limpar</button>
            <button id="btn" class="btn">Botão</button>

 
        </form> 

        </form>
    </div>
</body>
</html>
