    <div id="div-form">
        <h3>FOrmulário HTML</h3>

        <form name="form-pessoa" id="form-pessoa" method="post">

            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input-tx01" maxlength="5" required
            placeholder="Informe seu nome">

            <br><br>

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-tx01" maxlength="14" required
            placeholder="Informe seu CPF"

            <br><br>

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-tx01" maxlength="14" required
            pattern="\d(3)\. \d(3)\. \d(3)-\d(2)" placeholder="000.000.000"> 

            <br><br>

            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sxF" class="input-radio" value="F" required value="F"> Feminino
            <input type="radio" name="sexo" id="sxM" class="input-radio" value="M" required value="M"> Masculino
            <input type="radio" name="sexo" id="sxO" class="input-radio" value="O" required value="O"> Outro

            <br><br>

            <select name="estado" id="estado" class="input-txt02" required>
                <option>Selecione o Estado</option>
                <option value="AL">Alagoas</option>
                <option value="BA">Bahia</option>
                <option value="PE">Pernambuco</option>
                <option value="PB">Paraiba</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="CE">Ceará</option>
                <option value="PI">Piaui</option>
                <option value="MA">Maranhão</option>
                <option value="SE">Sergipe</option>
            </select>

            <label for="preferencias">Preferências</label>
            <input type="checkbox" name="estudo" class="input= check" id="estudo" value="estudo">Estudo
            <input type="checkbox" name="viagem" class="input= check" id="viagem" value="viagem">Viagem
            <input type="checkbox" name="trabalho" class="input= check" id="trabalho" value="trabalho">Trabalho
            <input type="checkbox" name="compras" class="input= check" id="compras" value="compras">Compras
        </form> 

        </form>
    </div>
